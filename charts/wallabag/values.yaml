# Default values for wallabag
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: wallabag/wallabag
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  host: wallabag.example.com
  tls:
    enabled: false
    # Overrides TLS host
    # host: wallabag.example.com
    # Secret could be manually created in the namespace
    # secretName: wallabag-tls

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

# MariaDB subchart configuration
mariadb:
  # Enable MariaDB subchart (set to false to use external database)
  enabled: false
  # MariaDB architecture (standalone or replication)
  architecture: standalone
  # MariaDB authentication
  auth:
    database: wallabag
    username: wallabag
    password: ""
    rootPassword: ""
  # MariaDB primary configuration
  primary:
    persistence:
      enabled: true
      size: 8Gi

# PostgreSQL subchart configuration
postgresql:
  # Enable PostgreSQL subchart (set to false to use external database)
  enabled: false
  # PostgreSQL architecture (standalone or replication)
  architecture: standalone
  # PostgreSQL authentication
  auth:
    database: wallabag
    username: wallabag
    # required if existingSecret is not set, never commit this value
    password: ""
    # required if existingSecret is not set, never commit this value
    postgresPassword: ""
    # Name of an existing Secret containing `password` and `postgres-password` keys.
    # If set, no Secret will be created by this chart for database credentials.
    existingSecret: ""
  # PostgreSQL primary configuration
  primary:
    persistence:
      enabled: true
      size: 8Gi

# Redis subchart configuration
redis:
  # Enable Redis subchart (set to false to use external Redis)
  enabled: false
  # Redis architecture (standalone or replication)
  architecture: standalone
  # Redis authentication
  auth:
    enabled: false
    password: ""
  # Redis master configuration
  master:
    persistence:
      enabled: true
      size: 1Gi

# External database configuration (used when mariadb.enabled: false)
externalDatabase:
  # Database driver (support `pdo_sqlite`, `pdo_mysql` or `pdo_pgsql`)
  driver: "pdo_mysql"
  host: ""
  port: 3306
  database: "wallabag"
  username: "wallabag"
  password: ""
  rootPassword: ""
  # Name of existing secret for database credentials
  # If set, the chart will not create db-credentials secret and will use this instead
  existingSecret: ""
  # Name of existing secret for database admin credentials
  existingAdminSecret: ""

# External Redis configuration (used when redis.enabled: false)
externalRedis:
  host: ""
  port: 6379
  password: ""
  # Name of existing secret for redis credentials
  # If set, the chart will not create redis-credentials secret and will use this instead
  existingSecret: ""

# Persistence configuration
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  # Custom labels for the main PVC
  # labels:
  #   app.kubernetes.io/component: storage
  #   backup: "true"
  labels: {}
  # Additional volume mounts for the wallabag container
  # Useful for mounting custom volumes like cache, logs, or additional storage
  # Each extra volume can specify:
  # - name: Name of the volume (required)
  # - mountPath: Path where the volume will be mounted in the container (required)
  # - accessMode: Access mode for the PVC (optional, default: ReadWriteOnce)
  # - size: Storage size for the PVC (required)
  # - storageClass: Storage class for the PVC (optional)
  # - labels: Custom labels for the PVC (optional)
  # Example:
  # extraVolumes:
  #   - name: wallabag-cache
  #     mountPath: /var/www/wallabag/var/cache
  #     accessMode: ReadWriteOnce
  #     size: 1Gi
  #     storageClass: "local-path"
  #     labels:
  #       app.kubernetes.io/component: cache
  #       backup: "false"
  #   - name: wallabag-logs
  #     mountPath: /var/www/wallabag/var/logs
  #     accessMode: ReadWriteOnce
  #     size: 5Gi
  #     labels:
  #       app.kubernetes.io/component: logs
  extraVolumes: []

# Probes configuration
# Liveness probe configuration
livenessProbe:
  enabled: true
  # httpGet configuration
  httpGet:
    path: "/api/info"
    port: "http"
    # scheme: "HTTP"  # Optional: HTTP or HTTPS
  # initialDelaySeconds: 30  # Optional: Delay before first probe
  # periodSeconds: 10       # Optional: How often to perform probe
  # timeoutSeconds: 1       # Optional: When probe times out
  # successThreshold: 1     # Optional: Minimum consecutive successes
  # failureThreshold: 3     # Optional: Minimum consecutive failures

# Readiness probe configuration
readinessProbe:
  enabled: true
  # httpGet configuration
  httpGet:
    path: "/api/info"
    port: "http"
    # scheme: "HTTP"  # Optional: HTTP or HTTPS
  # initialDelaySeconds: 5   # Optional: Delay before first probe
  # periodSeconds: 5        # Optional: How often to perform probe
  # timeoutSeconds: 1       # Optional: When probe times out
  # successThreshold: 1     # Optional: Minimum consecutive successes
  # failureThreshold: 3     # Optional: Minimum consecutive failures

# Startup probe configuration
startupProbe:
  enabled: false
  # httpGet configuration
  httpGet:
    path: "/api/info"
    port: "http"
    # scheme: "HTTP"  # Optional: HTTP or HTTPS
  # initialDelaySeconds: 30  # Optional: Delay before first probe
  # periodSeconds: 10       # Optional: How often to perform probe
  # timeoutSeconds: 1       # Optional: When probe times out
  # successThreshold: 1     # Optional: Minimum consecutive successes
  # failureThreshold: 30    # Optional: Minimum consecutive failures
# Wallabag specific configuration
wallabag:
  # Overrides the domain name used in the application (by default use ingress.host if enabled)
  # domainName: wallabag.example.com
  # PHP memory limit
  memoryLimit: "128M"
  # User-friendly name of your instance for 2FA issuer
  serverName: "Your wallabag instance"
  # A secret key that's used to generate certain security-related tokens
  secret: "ovmpmAWXRCabNlMgzlzFXDYmCFfzGv"
  # Default language of your wallabag instance (like en, fr, es, etc.)
  locale: "en"
  # email address used in From: field in each email
  fromEmail: "no-reply@wallabag.org"
  # two factor email sender
  twofactorSender: "no-reply@wallabag.org"
  # Mailer DSN for sending emails
  mailerDsn: "smtp://127.0.0.1"
  # DSN from Sentry which logs errors
  sentryDsn: ""
  fos:
    # Enable public registration
    userRegistration: false
    # Send a confirmation by email for each registration
    userConfirmation: true
  # Example:
  # extraConfig:
  #   rabbitmq_host: "rabbitmq"
  #   rabbitmq_port: "5672"
  #   rabbitmq_user: "wallabag"
  #   rabbitmq_password: "password"
  #   prefetch_count: "10"
